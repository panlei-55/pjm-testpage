<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ファイルアクセス確認</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    .item { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; background: #fff; padding: 16px 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .label { font-size: 0.9rem; color: #555; flex: 1; word-break: break-all; }
    .badge { font-weight: bold; font-size: 1rem; min-width: 48px; text-align: center; padding: 4px 12px; border-radius: 4px; }
    .ok   { background: #d4edda; color: #155724; }
    .ng   { background: #f8d7da; color: #721c24; }
    .checking { background: #fff3cd; color: #856404; }
    button { margin-top: 24px; padding: 10px 28px; font-size: 1rem; cursor: pointer; border: none; background: #0078d4; color: #fff; border-radius: 6px; }
    button:hover { background: #005fa3; }
  </style>
</head>
<body>
  <h1>ファイルアクセス確認</h1>

  <div class="item">
    <span class="label">① ファイル1<br><small>https://bnhd.sharepoint.com/:x:/s/msteams_0ac7e3/...</small></span>
    <span class="badge checking" id="status1">確認中</span>
  </div>

  <div class="item">
    <span class="label">② ファイル2<br><small>https://bnhd.sharepoint.com/:x:/s/msteams_44221c/...</small></span>
    <span class="badge checking" id="status2">確認中</span>
  </div>

  <button onclick="checkAll()">再チェック</button>

  <script>
    const files = [
      {
        id: "status1",
        url: "https://bnhd.sharepoint.com/:x:/s/msteams_0ac7e3/IQCgy2rsHATXT5Q52ip-8dAnAUi5F_OoqOfjSJe-oh2VPV8?e=RKLGgg"
      },
      {
        id: "status2",
        url: "https://bnhd.sharepoint.com/:x:/s/msteams_44221c/IQCSwo-kToIiR4mq1D9mggY6AcdvW-KmJWgv86t7NDIps5w?e=1PReDc"
      }
    ];

    async function checkFile(file) {
      const el = document.getElementById(file.id);
      el.textContent = "確認中";
      el.className = "badge checking";
      try {
        const res = await fetch(file.url, { method: "HEAD", mode: "no-cors" });
        // no-cors では status=0 になるが、エラーなく返ればネットワーク到達とみなす
        el.textContent = "OK";
        el.className = "badge ok";
      } catch (e) {
        el.textContent = "NG";
        el.className = "badge ng";
      }
    }

    function checkAll() {
      files.forEach(checkFile);
    }

    // 初回自動チェック
    checkAll();
  </script>
</body>
</html>
